server {
  listen 13003;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy the REST API to the backend service (docker network).
  location /api/ {
    proxy_pass http://backend:13000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Socket.io needs WebSocket upgrade + long timeouts.
  location /socket.io/ {
    proxy_pass http://backend:13000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Long cache for hashed static assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA — fall back to index.html for client-side routes (react-router).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
