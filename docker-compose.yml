services:
  postgres:
    image: postgres:15
    container_name: crm-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crm_platform
      POSTGRES_USER: crm_admin
      POSTGRES_PASSWORD: crm_secret_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_admin -d crm_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - crm-network

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - crm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: crm-backend
    ports:
      - "13000:13000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      CORS_ORIGINS: "http://localhost:13001,http://localhost:13002,http://localhost:13003,http://localhost:13004,http://localhost:13005,http://localhost:13006,http://localhost:13007,http://localhost:13008,http://localhost:13009,http://localhost:13010"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npx ts-node-dev --respawn src/server.ts
    networks:
      - crm-network

  # ─── Industry Frontends ────────────────────────────────────────────

  novapay-frontend:
    build:
      context: ./frontends/novapay
      dockerfile: Dockerfile
      target: dev
    container_name: crm-novapay-frontend
    ports:
      - "13001:13001"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:13000
    volumes:
      - ./frontends/novapay:/app
      - /app/node_modules
    networks:
      - crm-network

  medvista-frontend:
